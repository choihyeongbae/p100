<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>나를 닮은 동물 찾기 🐾</title>
<link href="https://fonts.googleapis.com/css2?family=Gaegu:wght@400;700&family=Noto+Sans+KR:wght@300;400;700&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #fdf6ec; --card: #fff9f0; --accent: #ff7043; --accent2: #ffb74d;
    --text: #3e2723; --muted: #8d6e63; --border: #ffe0b2; --shadow: rgba(255,112,67,0.15);
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    font-family: 'Noto Sans KR', sans-serif; background: var(--bg); color: var(--text);
    min-height: 100vh; padding: 40px 20px;
    background-image: radial-gradient(circle at 10% 20%, rgba(255,183,77,0.15) 0%, transparent 50%),
                      radial-gradient(circle at 90% 80%, rgba(255,112,67,0.1) 0%, transparent 50%);
  }
  .container { max-width: 680px; margin: 0 auto; }
  .header { text-align: center; margin-bottom: 40px; animation: fadeDown 0.6s ease; }
  .header .emoji-big { font-size: 64px; display: block; margin-bottom: 12px; animation: bounce 2s infinite; }
  .header h1 { font-family: 'Gaegu', cursive; font-size: 2.4rem; color: var(--accent); }
  .header p { color: var(--muted); margin-top: 8px; font-size: 0.95rem; }
  .card { background: var(--card); border: 1.5px solid var(--border); border-radius: 20px; padding: 28px; box-shadow: 0 4px 24px var(--shadow); animation: fadeUp 0.6s ease 0.2s both; }
  .card label { display: block; font-weight: 700; margin-bottom: 10px; font-size: 1rem; }
  .card label span { font-weight: 300; color: var(--muted); font-size: 0.85rem; margin-left: 6px; }
  .tags-wrapper {
    border: 1.5px solid var(--border); border-radius: 14px; padding: 12px; background: #fff;
    min-height: 120px; display: flex; flex-wrap: wrap; gap: 8px; align-content: flex-start;
    cursor: text; transition: border-color 0.2s; margin-bottom: 16px;
  }
  .tags-wrapper:focus-within { border-color: var(--accent); }
  .tag { display: inline-flex; align-items: center; gap: 6px; background: linear-gradient(135deg, #ffe0b2, #ffccbc); color: var(--accent); border-radius: 20px; padding: 5px 12px; font-size: 0.85rem; font-weight: 700; animation: popIn 0.2s ease; }
  .tag button { background: none; border: none; cursor: pointer; color: var(--accent); font-size: 1rem; opacity: 0.6; }
  .tag button:hover { opacity: 1; }
  #tagInput { border: none; outline: none; font-size: 0.9rem; font-family: 'Noto Sans KR', sans-serif; color: var(--text); background: transparent; min-width: 160px; flex: 1; }
  #tagInput::placeholder { color: #d7ccc8; }
  .hint { font-size: 0.78rem; color: var(--muted); margin-bottom: 20px; }
  .btn { width: 100%; padding: 16px; background: linear-gradient(135deg, var(--accent), #ff5722); color: white; border: none; border-radius: 14px; font-size: 1.05rem; font-weight: 700; font-family: 'Noto Sans KR', sans-serif; cursor: pointer; transition: transform 0.15s, box-shadow 0.15s; box-shadow: 0 4px 16px rgba(255,87,34,0.35); }
  .btn:hover:not(:disabled) { transform: translateY(-2px); box-shadow: 0 8px 24px rgba(255,87,34,0.4); }
  .btn:disabled { opacity: 0.6; cursor: not-allowed; }
  .loading { text-align: center; padding: 40px 20px; animation: fadeUp 0.4s ease; }
  .paw-loader { display: flex; justify-content: center; gap: 8px; margin-bottom: 16px; }
  .paw-loader span { font-size: 28px; animation: pawBounce 1.2s ease-in-out infinite; }
  .paw-loader span:nth-child(2) { animation-delay: 0.2s; }
  .paw-loader span:nth-child(3) { animation-delay: 0.4s; }
  .result-card { background: var(--card); border: 1.5px solid var(--border); border-radius: 20px; padding: 32px 28px; box-shadow: 0 8px 32px var(--shadow); margin-top: 24px; animation: fadeUp 0.5s ease; }
  .result-header { display: flex; align-items: center; gap: 10px; margin-bottom: 20px; padding-bottom: 16px; border-bottom: 1.5px dashed var(--border); }
  .result-header h2 { font-family: 'Gaegu', cursive; font-size: 1.3rem; color: var(--accent); }
  .result-text { font-size: 1rem; line-height: 1.85; color: var(--text); white-space: pre-wrap; word-break: keep-all; }
  .retry-btn { display: block; width: 100%; margin-top: 20px; padding: 12px; background: transparent; border: 1.5px solid var(--accent); border-radius: 12px; color: var(--accent); font-size: 0.9rem; font-weight: 700; font-family: 'Noto Sans KR', sans-serif; cursor: pointer; transition: all 0.15s; }
  .retry-btn:hover { background: var(--accent); color: white; }
  .error-box { background: #fff3f3; border: 1.5px solid #ffcdd2; border-radius: 14px; padding: 16px 20px; margin-top: 20px; color: #c62828; font-size: 0.9rem; white-space: pre-wrap; animation: fadeUp 0.3s ease; }
  @keyframes fadeDown { from{opacity:0;transform:translateY(-20px);}to{opacity:1;transform:translateY(0);} }
  @keyframes fadeUp { from{opacity:0;transform:translateY(16px);}to{opacity:1;transform:translateY(0);} }
  @keyframes bounce { 0%,100%{transform:translateY(0);}50%{transform:translateY(-10px);} }
  @keyframes pawBounce { 0%,80%,100%{transform:translateY(0);}40%{transform:translateY(-12px);} }
  @keyframes popIn { from{transform:scale(0.7);opacity:0;}to{transform:scale(1);opacity:1;} }
</style>
</head>
<body>
<div class="container">
  <div class="header">
    <span class="emoji-big">🐾</span>
    <h1>나를 닮은 동물 찾기</h1>
    <p>나의 성격 특성을 입력하면 AI가 닮은 동물을 찾아줘요</p>
  </div>
  <div class="card">
    <label>나의 성격 특성 <span>Enter로 추가, ×로 삭제</span></label>
    <div class="tags-wrapper" id="tagsWrapper">
      <input type="text" id="tagInput" placeholder="예: 아침에 일찍 일어나는 걸 싫어함">
    </div>
    <p class="hint">💡 특성을 하나씩 입력하고 Enter를 누르세요. 여러 개 추가할수록 정확해져요!</p>
    <button class="btn" id="submitBtn" onclick="analyze()">🔍 내 동물 찾기</button>
  </div>
  <div class="loading" id="loading" style="display:none">
    <div class="paw-loader"><span>🐾</span><span>🐾</span><span>🐾</span></div>
    <p>Gemini가 열심히 분석 중이에요...</p>
  </div>
  <div class="error-box" id="errorBox" style="display:none"></div>
  <div class="result-card" id="resultCard" style="display:none">
    <div class="result-header">
      <span style="font-size:24px">✨</span>
      <h2>Gemini의 분석 결과</h2>
    </div>
    <div class="result-text" id="resultText"></div>
    <button class="retry-btn" onclick="reset()">↩ 다시 분석하기</button>
  </div>
</div>

<script>
// ↓↓↓↓↓↓↓↓↓↓↓↓↓↓↓↓↓↓↓↓↓↓↓↓↓↓↓↓↓↓↓↓↓↓↓↓↓↓↓↓↓↓↓
const API_KEY = "AIzaSyCp7kvx2NBtGT4Q9hghnd-S1a2VemdjDPw";   // ← 이 줄만 수정!
// ↑↑↑↑↑↑↑↑↑↑↑↑↑↑↑↑↑↑↑↑↑↑↑↑↑↑↑↑↑↑↑↑↑↑↑↑↑↑↑↑↑↑↑

const API_URL = `https://generativelanguage.googleapis.com/v1beta/models/gemini-2.5-flash-preview-04-17:generateContent?key=${API_KEY}`;

const tags = [];

document.getElementById('tagInput').addEventListener('keydown', function(e) {
  if (e.key === 'Enter') {
    e.preventDefault();
    const val = this.value.trim();
    if (val) addTag(val);
    this.value = '';
  }
});
document.getElementById('tagsWrapper').addEventListener('click', () => document.getElementById('tagInput').focus());

function addTag(text) {
  tags.push(text);
  const tag = document.createElement('span');
  tag.className = 'tag';
  tag.dataset.text = text;
  tag.innerHTML = `${text} <button onclick="removeTag(this)">×</button>`;
  document.getElementById('tagsWrapper').insertBefore(tag, document.getElementById('tagInput'));
}

function removeTag(btn) {
  const tag = btn.parentElement;
  const idx = tags.indexOf(tag.dataset.text);
  if (idx > -1) tags.splice(idx, 1);
  tag.remove();
}

async function analyze() {
  if (API_KEY === "여기에_API_키_붙여넣기") { showError('API 키가 설정되지 않았어요!\nHTML 파일에서 API_KEY를 수정해주세요.'); return; }
  if (tags.length === 0) { showError('성격 특성을 최소 1개 이상 입력해주세요!'); return; }

  const traits = tags.map(t => `- ${t}`).join('\n');
  const prompt = `나는 다음과 같은 사람이야:\n${traits}\n\n나를 어울리는 동물 1마리로 표현하고, 그 이유를 3가지 근거로 설명해줘.\n마지막에 이모지로 요약해줘.`;

  document.getElementById('submitBtn').disabled = true;
  document.getElementById('loading').style.display = 'block';
  document.getElementById('resultCard').style.display = 'none';
  document.getElementById('errorBox').style.display = 'none';

  try {
    const res = await fetch(API_URL, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ contents: [{ parts: [{ text: prompt }] }] })
    });
    const data = await res.json();
    if (!res.ok) throw new Error(data.error?.message || `API 오류 ${res.status}`);
    const reply = data.candidates[0].content.parts[0].text;
    showResult(reply);
  } catch (err) {
    showError('오류: ' + err.message);
  } finally {
    document.getElementById('loading').style.display = 'none';
    document.getElementById('submitBtn').disabled = false;
  }
}

function showResult(text) {
  document.getElementById('resultText').textContent = text;
  document.getElementById('resultCard').style.display = 'block';
  document.getElementById('resultCard').scrollIntoView({ behavior: 'smooth' });
}
function showError(msg) {
  const box = document.getElementById('errorBox');
  box.textContent = '⚠️ ' + msg;
  box.style.display = 'block';
}
function reset() {
  document.getElementById('resultCard').style.display = 'none';
  document.getElementById('errorBox').style.display = 'none';
  window.scrollTo({ top: 0, behavior: 'smooth' });
}
</script>
</body>
</html>
