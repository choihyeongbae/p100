<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>기록 측정 시스템</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 20px;
        }

        .container {
            max-width: 800px;
            margin: 0 auto;
            background: white;
            border-radius: 20px;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
            overflow: hidden;
        }

        .header {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            padding: 30px;
            text-align: center;
        }

        .header h1 {
            font-size: 2em;
            margin-bottom: 10px;
        }

        .nav-tabs {
            display: flex;
            background: #f8f9fa;
            border-bottom: 2px solid #e0e0e0;
        }

        .nav-tab {
            flex: 1;
            padding: 20px;
            text-align: center;
            cursor: pointer;
            font-size: 1.1em;
            font-weight: 600;
            color: #666;
            transition: all 0.3s;
            border: none;
            background: none;
        }

        .nav-tab:hover {
            background: #e9ecef;
        }

        .nav-tab.active {
            background: white;
            color: #667eea;
            border-bottom: 3px solid #667eea;
        }

        .content {
            padding: 30px;
        }

        .tab-content {
            display: none;
        }

        .tab-content.active {
            display: block;
        }

        .form-group {
            margin-bottom: 20px;
        }

        label {
            display: block;
            margin-bottom: 8px;
            font-weight: 600;
            color: #333;
        }

        input, select {
            width: 100%;
            padding: 12px;
            border: 2px solid #e0e0e0;
            border-radius: 8px;
            font-size: 1em;
            transition: border-color 0.3s;
        }

        input:focus, select:focus {
            outline: none;
            border-color: #667eea;
        }

        .timer-display {
            text-align: center;
            margin: 30px 0;
        }

        .time {
            font-size: 4em;
            font-weight: bold;
            color: #667eea;
            font-family: 'Courier New', monospace;
            letter-spacing: 5px;
        }

        .controls {
            display: flex;
            gap: 15px;
            justify-content: center;
            margin: 30px 0;
        }

        button {
            padding: 15px 40px;
            font-size: 1.1em;
            font-weight: 600;
            border: none;
            border-radius: 10px;
            cursor: pointer;
            transition: all 0.3s;
        }

        .btn-start {
            background: #28a745;
            color: white;
        }

        .btn-start:hover {
            background: #218838;
            transform: translateY(-2px);
        }

        .btn-stop {
            background: #dc3545;
            color: white;
        }

        .btn-stop:hover {
            background: #c82333;
            transform: translateY(-2px);
        }

        .btn-reset {
            background: #6c757d;
            color: white;
        }

        .btn-reset:hover {
            background: #5a6268;
            transform: translateY(-2px);
        }

        .btn-save {
            background: #667eea;
            color: white;
        }

        .btn-save:hover {
            background: #5568d3;
            transform: translateY(-2px);
        }

        button:disabled {
            background: #ccc;
            cursor: not-allowed;
            transform: none;
        }

        .ranking-table {
            width: 100%;
            border-collapse: collapse;
            margin-top: 20px;
        }

        .ranking-table th,
        .ranking-table td {
            padding: 15px;
            text-align: left;
            border-bottom: 1px solid #e0e0e0;
        }

        .ranking-table th {
            background: #f8f9fa;
            font-weight: 600;
            color: #333;
            position: sticky;
            top: 0;
        }

        .ranking-table tr:hover {
            background: #f8f9fa;
        }

        .rank-badge {
            display: inline-block;
            width: 30px;
            height: 30px;
            line-height: 30px;
            text-align: center;
            border-radius: 50%;
            font-weight: bold;
            color: white;
        }

        .rank-1 {
            background: linear-gradient(135deg, #FFD700, #FFA500);
        }

        .rank-2 {
            background: linear-gradient(135deg, #C0C0C0, #808080);
        }

        .rank-3 {
            background: linear-gradient(135deg, #CD7F32, #8B4513);
        }

        .rank-other {
            background: #6c757d;
        }

        .no-data {
            text-align: center;
            padding: 40px;
            color: #999;
            font-size: 1.1em;
        }

        .filter-section {
            display: flex;
            gap: 15px;
            margin-bottom: 20px;
            flex-wrap: wrap;
        }

        .filter-group {
            flex: 1;
            min-width: 150px;
        }

        .stats-cards {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 15px;
            margin-bottom: 30px;
        }

        .stat-card {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            padding: 20px;
            border-radius: 10px;
            text-align: center;
        }

        .stat-card h3 {
            font-size: 0.9em;
            margin-bottom: 10px;
            opacity: 0.9;
        }

        .stat-card .value {
            font-size: 2em;
            font-weight: bold;
        }

        .time-input-group {
            display: flex;
            gap: 10px;
            align-items: flex-end;
        }

        .time-input-group input {
            flex: 1;
            text-align: center;
            font-size: 1.2em;
            font-weight: bold;
        }

        .time-separator {
            font-size: 1.5em;
            font-weight: bold;
            padding-bottom: 12px;
        }

        .record-preview {
            text-align: center;
            margin: 20px 0;
            padding: 20px;
            background: #f8f9fa;
            border-radius: 10px;
        }

        .record-preview .label {
            font-size: 0.9em;
            color: #666;
            margin-bottom: 10px;
        }

        .record-preview .time-display {
            font-size: 3em;
            font-weight: bold;
            color: #667eea;
            font-family: 'Courier New', monospace;
        }

        .message {
            padding: 15px;
            border-radius: 8px;
            margin-bottom: 20px;
            text-align: center;
            font-weight: 600;
        }

        .message.success {
            background: #d4edda;
            color: #155724;
            border: 1px solid #c3e6cb;
        }

        .message.error {
            background: #f8d7da;
            color: #721c24;
            border: 1px solid #f5c6cb;
        }

        .btn-delete {
            background: #dc3545;
            color: white;
            padding: 8px 16px;
            font-size: 0.9em;
            border-radius: 5px;
            cursor: pointer;
            border: none;
            transition: all 0.3s;
        }

        .btn-delete:hover {
            background: #c82333;
            transform: scale(1.05);
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>⏱️ [포지컬 100]</h1>
        </div>

        <div class="nav-tabs">
            <button class="nav-tab active" onclick="switchTab('record')">기록 측정</button>
            <button class="nav-tab" onclick="switchTab('ranking')">실시간 순위</button>
        </div>

        <div class="content">
            <!-- 기록 측정 탭 -->
            <div id="record-tab" class="tab-content active">
                <div id="message"></div>
                
                <div class="form-group">
                    <label for="timeSlot">타임 선택</label>
                    <select id="timeSlot">
                        <option value="">선택하세요</option>
                        <option value="1">1타임</option>
                        <option value="2">2타임</option>
                        <option value="3">3타임</option>
                    </select>
                </div>

                <div class="form-group">
                    <label for="grade">학년</label>
                    <select id="grade">
                        <option value="">선택하세요</option>
                        <option value="1">1학년</option>
                        <option value="2">2학년</option>
                        <option value="3">3학년</option>
                    </select>
                </div>

                <div class="form-group">
                    <label for="class">반</label>
                    <select id="class">
                        <option value="">선택하세요</option>
                        <option value="1">1반</option>
                        <option value="2">2반</option>
                        <option value="3">3반</option>
                        <option value="4">4반</option>
                        <option value="5">5반</option>
                        <option value="6">6반</option>
                        <option value="7">7반</option>
                        <option value="8">8반</option>
                        <option value="9">9반</option>
                    </select>
                </div>

                <div class="form-group">
                    <label for="number">번호</label>
                    <select id="number">
                        <option value="">선택하세요</option>
                        <option value="1">1번</option>
                        <option value="2">2번</option>
                        <option value="3">3번</option>
                        <option value="4">4번</option>
                        <option value="5">5번</option>
                        <option value="6">6번</option>
                        <option value="7">7번</option>
                        <option value="8">8번</option>
                        <option value="9">9번</option>
                        <option value="10">10번</option>
                        <option value="11">11번</option>
                        <option value="12">12번</option>
                        <option value="13">13번</option>
                        <option value="14">14번</option>
                        <option value="15">15번</option>
                        <option value="16">16번</option>
                        <option value="17">17번</option>
                        <option value="18">18번</option>
                        <option value="19">19번</option>
                        <option value="20">20번</option>
                        <option value="21">21번</option>
                        <option value="22">22번</option>
                        <option value="23">23번</option>
                        <option value="24">24번</option>
                        <option value="25">25번</option>
                    </select>
                </div>

                <div class="form-group">
                    <label for="name">이름</label>
                    <input type="text" id="name" placeholder="이름 입력">
                </div>

                <div class="form-group">
                    <label for="phone">핸드폰 번호</label>
                    <input type="tel" id="phone" placeholder="010-1234-5678">
                </div>

                <div class="form-group">
                    <label>기록 입력</label>
                    <div class="time-input-group">
                        <input type="number" id="minutes" placeholder="분" min="0" max="99" value="0">
                        <span class="time-separator">:</span>
                        <input type="number" id="seconds" placeholder="초" min="0" max="59" value="0">
                        <span class="time-separator">.</span>
                        <input type="number" id="centiseconds" placeholder="1/100" min="0" max="99" value="0">
                    </div>
                </div>

                <div class="record-preview">
                    <div class="label">입력된 기록</div>
                    <div class="time-display" id="recordDisplay">00:00.00</div>
                </div>

                <div class="controls">
                    <button class="btn-save" onclick="saveRecord()">기록 저장</button>
                </div>
            </div>

            <!-- 실시간 순위 탭 -->
            <div id="ranking-tab" class="tab-content">
                <div id="rankingMessage"></div>
                
                <div class="stats-cards">
                    <div class="stat-card">
                        <h3>총 참가자</h3>
                        <div class="value" id="totalCount">0</div>
                    </div>
                    <div class="stat-card">
                        <h3>최고 기록</h3>
                        <div class="value" id="bestRecord">-</div>
                    </div>
                    <div class="stat-card">
                        <h3>평균 기록</h3>
                        <div class="value" id="avgRecord">-</div>
                    </div>
                </div>

                <div class="filter-section">
                    <div class="filter-group">
                        <label for="filterTimeSlot">타임 필터</label>
                        <select id="filterTimeSlot" onchange="filterRanking()">
                            <option value="">전체</option>
                            <option value="1">1타임</option>
                            <option value="2">2타임</option>
                            <option value="3">3타임</option>
                        </select>
                    </div>
                    <div class="filter-group">
                        <label for="filterGrade">학년 필터</label>
                        <select id="filterGrade" onchange="filterRanking()">
                            <option value="">전체</option>
                            <option value="1">1학년</option>
                            <option value="2">2학년</option>
                            <option value="3">3학년</option>
                        </select>
                    </div>
                    <div class="filter-group">
                        <label for="filterClass">반 필터</label>
                        <select id="filterClass" onchange="filterRanking()">
                            <option value="">전체</option>
                            <option value="1">1반</option>
                            <option value="2">2반</option>
                            <option value="3">3반</option>
                            <option value="4">4반</option>
                            <option value="5">5반</option>
                            <option value="6">6반</option>
                            <option value="7">7반</option>
                            <option value="8">8반</option>
                            <option value="9">9반</option>
                        </select>
                    </div>
                </div>

                <table class="ranking-table">
                    <thead>
                        <tr>
                            <th>순위</th>
                            <th>타임</th>
                            <th>학년/반/번호</th>
                            <th>이름</th>
                            <th>핸드폰</th>
                            <th>기록</th>
                            <th>측정 시간</th>
                            <th>삭제</th>
                        </tr>
                    </thead>
                    <tbody id="rankingBody">
                        <tr>
                            <td colspan="8" class="no-data">아직 기록이 없습니다</td>
                        </tr>
                    </tbody>
                </table>
            </div>
        </div>
    </div>

    <script>
        // 로컬 스토리지에서 기록 불러오기
        function loadRecords() {
            const records = localStorage.getItem('records');
            const data = records ? JSON.parse(records) : [];
            
            // 기존 데이터에 ID가 없으면 추가
            return data.map((record, index) => {
                if (!record.id) {
                    record.id = Date.now() + index;
                }
                return record;
            });
        }

        // 로컬 스토리지에 기록 저장
        function saveRecords(records) {
            localStorage.setItem('records', JSON.stringify(records));
        }

        // 기록 미리보기 업데이트
        function updateRecordPreview() {
            const minutes = parseInt(document.getElementById('minutes').value) || 0;
            const seconds = parseInt(document.getElementById('seconds').value) || 0;
            const centiseconds = parseInt(document.getElementById('centiseconds').value) || 0;

            const display = 
                String(minutes).padStart(2, '0') + ':' +
                String(seconds).padStart(2, '0') + '.' +
                String(centiseconds).padStart(2, '0');

            document.getElementById('recordDisplay').textContent = display;
        }

        // 입력 필드에 이벤트 리스너 추가
        document.addEventListener('DOMContentLoaded', function() {
            document.getElementById('minutes').addEventListener('input', updateRecordPreview);
            document.getElementById('seconds').addEventListener('input', updateRecordPreview);
            document.getElementById('centiseconds').addEventListener('input', updateRecordPreview);
        });

        // 탭 전환
        function switchTab(tabName) {
            document.querySelectorAll('.nav-tab').forEach(tab => {
                tab.classList.remove('active');
            });
            document.querySelectorAll('.tab-content').forEach(content => {
                content.classList.remove('active');
            });

            event.target.classList.add('active');
            document.getElementById(tabName + '-tab').classList.add('active');

            if (tabName === 'ranking') {
                updateRanking();
            }
        }

        // 기록 저장
        function saveRecord() {
            const timeSlot = document.getElementById('timeSlot').value;
            const grade = document.getElementById('grade').value;
            const classNum = document.getElementById('class').value;
            const number = document.getElementById('number').value;
            const name = document.getElementById('name').value;
            const phone = document.getElementById('phone').value;
            const minutes = parseInt(document.getElementById('minutes').value) || 0;
            const seconds = parseInt(document.getElementById('seconds').value) || 0;
            const centiseconds = parseInt(document.getElementById('centiseconds').value) || 0;

            if (!timeSlot) {
                showMessage('타임을 선택해주세요.', 'error');
                return;
            }

            if (!grade || !classNum || !number || !name) {
                showMessage('모든 정보를 입력해주세요.', 'error');
                return;
            }

            if (!phone) {
                showMessage('핸드폰 번호를 입력해주세요.', 'error');
                return;
            }

            if (minutes === 0 && seconds === 0 && centiseconds === 0) {
                showMessage('기록을 입력해주세요.', 'error');
                return;
            }

            // 초 단위 검증
            if (seconds >= 60) {
                showMessage('초는 0~59 사이의 값을 입력해주세요.', 'error');
                return;
            }

            // 1/100초 단위 검증
            if (centiseconds >= 100) {
                showMessage('1/100초는 0~99 사이의 값을 입력해주세요.', 'error');
                return;
            }

            // 밀리초로 변환 (정확한 계산을 위해)
            const totalMilliseconds = (minutes * 60 * 1000) + (seconds * 1000) + (centiseconds * 10);

            const timeDisplay = 
                String(minutes).padStart(2, '0') + ':' +
                String(seconds).padStart(2, '0') + '.' +
                String(centiseconds).padStart(2, '0');

            const record = {
                id: Date.now(), // 고유 ID 추가
                timeSlot: parseInt(timeSlot),
                grade: parseInt(grade),
                class: parseInt(classNum),
                number: parseInt(number),
                name: name,
                phone: phone,
                time: totalMilliseconds,
                timeDisplay: timeDisplay,
                timestamp: new Date().toLocaleString('ko-KR')
            };

            const records = loadRecords();
            records.push(record);
            saveRecords(records);

            showMessage('기록이 저장되었습니다!', 'success');
            
            // 폼 초기화
            document.getElementById('timeSlot').value = '';
            document.getElementById('grade').value = '';
            document.getElementById('class').value = '';
            document.getElementById('number').value = '';
            document.getElementById('name').value = '';
            document.getElementById('phone').value = '';
            document.getElementById('minutes').value = '0';
            document.getElementById('seconds').value = '0';
            document.getElementById('centiseconds').value = '0';
            updateRecordPreview();
        }

        // 기록 삭제
        function deleteRecord(id) {
            if (!confirm('정말 이 기록을 삭제하시겠습니까?')) {
                return;
            }

            const records = loadRecords();
            const filteredRecords = records.filter(record => record.id !== id);
            saveRecords(filteredRecords);
            
            showRankingMessage('기록이 삭제되었습니다.', 'success');
            updateRanking();
        }

        // 순위 탭 메시지 표시
        function showRankingMessage(text, type) {
            const messageDiv = document.getElementById('rankingMessage');
            messageDiv.className = 'message ' + type;
            messageDiv.textContent = text;
            messageDiv.style.display = 'block';

            setTimeout(() => {
                messageDiv.style.display = 'none';
            }, 3000);
        }

        // 메시지 표시
        function showMessage(text, type) {
            const messageDiv = document.getElementById('message');
            messageDiv.className = 'message ' + type;
            messageDiv.textContent = text;
            messageDiv.style.display = 'block';

            setTimeout(() => {
                messageDiv.style.display = 'none';
            }, 3000);
        }

        // 순위 업데이트
        function updateRanking() {
            const records = loadRecords();
            const filtered = filterRecordsBy(records);
            
            // 통계 업데이트
            document.getElementById('totalCount').textContent = filtered.length;
            
            if (filtered.length > 0) {
                const sortedRecords = [...filtered].sort((a, b) => a.time - b.time);
                document.getElementById('bestRecord').textContent = sortedRecords[0].timeDisplay;
                
                const avgTime = filtered.reduce((sum, r) => sum + r.time, 0) / filtered.length;
                const avgMs = Math.floor((avgTime % 1000) / 10);
                const avgSec = Math.floor((avgTime / 1000) % 60);
                const avgMin = Math.floor(avgTime / 60000);
                const avgDisplay = 
                    String(avgMin).padStart(2, '0') + ':' +
                    String(avgSec).padStart(2, '0') + '.' +
                    String(avgMs).padStart(2, '0');
                document.getElementById('avgRecord').textContent = avgDisplay;
            } else {
                document.getElementById('bestRecord').textContent = '-';
                document.getElementById('avgRecord').textContent = '-';
            }

            displayRanking(filtered);
        }

        // 필터링
        function filterRecordsBy(records) {
            const filterTimeSlot = document.getElementById('filterTimeSlot').value;
            const filterGrade = document.getElementById('filterGrade').value;
            const filterClass = document.getElementById('filterClass').value;

            return records.filter(record => {
                if (filterTimeSlot && record.timeSlot !== parseInt(filterTimeSlot)) return false;
                if (filterGrade && record.grade !== parseInt(filterGrade)) return false;
                if (filterClass && record.class !== parseInt(filterClass)) return false;
                return true;
            });
        }

        // 필터 적용
        function filterRanking() {
            updateRanking();
        }

        // 순위 표시
        function displayRanking(records) {
            const tbody = document.getElementById('rankingBody');
            
            if (records.length === 0) {
                tbody.innerHTML = '<tr><td colspan="8" class="no-data">기록이 없습니다</td></tr>';
                return;
            }

            const sortedRecords = [...records].sort((a, b) => a.time - b.time);
            
            tbody.innerHTML = sortedRecords.map((record, index) => {
                const rank = index + 1;
                const rankClass = rank === 1 ? 'rank-1' : rank === 2 ? 'rank-2' : rank === 3 ? 'rank-3' : 'rank-other';
                
                return `
                    <tr>
                        <td><span class="rank-badge ${rankClass}">${rank}</span></td>
                        <td>${record.timeSlot}타임</td>
                        <td>${record.grade}학년 ${record.class}반 ${record.number}번</td>
                        <td>${record.name}</td>
                        <td>${record.phone}</td>
                        <td><strong>${record.timeDisplay}</strong></td>
                        <td>${record.timestamp}</td>
                        <td><button class="btn-delete" onclick="deleteRecord(${record.id})">삭제</button></td>
                    </tr>
                `;
            }).join('');
        }
    </script>
</body>
</html>
